        function addEdge(sourceId, targetId) {
            if (state.edges.find(e => e.sourceId === sourceId && e.targetId === targetId)) return;
            state.edges.push({
                id: 'edge_' + nextEdgeId++, sourceId, targetId, label: '関係性', color: '#94a3b8',
                hasArrow: true, waypoints: [], labelOffset: { x: 0, y: 0 }, style: 'solid', width: 3
            });
        }

        function ensureMarker(color) {
            const id = 'arrow-' + color.replace('#', '');
            if (!document.getElementById(id)) {
                const marker = document.createElementNS('http://www.w3.org/2000/svg', 'marker');
                marker.setAttribute('id', id);
                marker.setAttribute('viewBox', '0 0 10 10');
                marker.setAttribute('refX', '7');
                marker.setAttribute('refY', '5');
                marker.setAttribute('markerWidth', '5');
                marker.setAttribute('markerHeight', '5');
                marker.setAttribute('orient', 'auto-start-reverse');
                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                path.setAttribute('d', 'M 0 1 L 10 5 L 0 9 z');
                path.setAttribute('fill', color);
                marker.appendChild(path);
                document.getElementById('svgDefs').appendChild(marker);
            }
            return `url(#${id})`;
        }

        function getBoundaryRadius(dx, dy) {
            const len = Math.hypot(dx, dy);
            if (len === 0) return 55;
            return 55 + (dy / len > 0 ? (dy / len) * 40 : 0);
        }

        function renderEdges() {
            const svgLayer = document.getElementById('svgLayer');
            svgLayer.innerHTML = '<defs id="svgDefs"></defs>';
            const elementsLayer = document.getElementById('elementsLayer');
            elementsLayer.querySelectorAll('.edge-label, .waypoint-handle, .waypoint-add-handle').forEach(el => el.remove());
            const activeNodeIds = getActiveNodeIdsForGroup();

            state.edges.forEach(edge => {
                const sn = state.nodes.find(n => n.id === edge.sourceId);
                const tn = state.nodes.find(n => n.id === edge.targetId);
                if (!sn || !tn) return;
                const isActiveEdge = activeNodeIds ? (activeNodeIds.has(edge.sourceId) && activeNodeIds.has(edge.targetId)) : true;

                const pts = [{ x: sn.x, y: sn.y }, ...edge.waypoints, { x: tn.x, y: tn.y }];

                const hasReverse = state.edges.some(e => e.sourceId === edge.targetId && e.targetId === edge.sourceId && e.waypoints.length === 0);
                if (pts.length === 2 && hasReverse) {
                    const dx = pts[1].x - pts[0].x, dy = pts[1].y - pts[0].y;
                    const len = Math.hypot(dx, dy);
                    if (len > 0) {
                        const nx = -(dy/len)*18, ny = (dx/len)*18;
                        pts[0].x += nx; pts[0].y += ny; pts[1].x += nx; pts[1].y += ny;
                    }
                }

                if (pts.length >= 2) {
                    const dx1 = pts[1].x - pts[0].x, dy1 = pts[1].y - pts[0].y;
                    const len1 = Math.hypot(dx1, dy1), r1 = getBoundaryRadius(dx1, dy1);
                    if (len1 > r1) { pts[0].x += (dx1/len1)*r1; pts[0].y += (dy1/len1)*r1; }
                    
                    const last = pts.length - 1;
                    const dx2 = pts[last].x - pts[last-1].x, dy2 = pts[last].y - pts[last-1].y;
                    const len2 = Math.hypot(dx2, dy2), r2 = getBoundaryRadius(-dx2, -dy2);
                    if (len2 > r2) { pts[last].x -= (dx2/len2)*r2; pts[last].y -= (dy2/len2)*r2; }
                }

                // 線描画
                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                let d = `M ${pts[0].x} ${pts[0].y}`;
                for (let i = 1; i < pts.length; i++) d += ` L ${pts[i].x} ${pts[i].y}`;
                
                path.setAttribute('d', d);
                path.setAttribute('stroke', edge.color);
                path.setAttribute('stroke-width', edge.width || 3);
                path.setAttribute('fill', 'none');
                if (activeNodeIds && !isActiveEdge) {
                    path.setAttribute('stroke-opacity', '0.08');
                }
                
                // 線のスタイル
                if (edge.style === 'dashed') {
                    const w = edge.width || 3;
                    path.setAttribute('stroke-dasharray', `${w*3}, ${w*3}`);
                } else if (edge.style === 'dotted') {
                    const w = edge.width || 3;
                    path.setAttribute('stroke-dasharray', `${w}, ${w*2}`);
                    path.setAttribute('stroke-linecap', 'round');
                }
                
                if (edge.hasArrow && (!activeNodeIds || isActiveEdge)) path.setAttribute('marker-end', ensureMarker(edge.color));
                svgLayer.appendChild(path);

                path.addEventListener('contextmenu', e => {
                    e.preventDefault();
                    e.stopPropagation();
                    openEdgeContextMenu(e.clientX, e.clientY, edge.id);
                });

                // ラベル位置計算
                let totalLen = 0; const segs = [];
                for (let i = 0; i < pts.length - 1; i++) {
                    const dx = pts[i+1].x - pts[i].x, dy = pts[i+1].y - pts[i].y;
                    const len = Math.hypot(dx, dy);
                    segs.push({ len, dx, dy, start: pts[i] }); totalLen += len;
                }
                let targetLen = totalLen / 2, midX = pts[0].x, midY = pts[0].y;
                for (let i = 0; i < segs.length; i++) {
                    if (targetLen <= segs[i].len || i === segs.length - 1) {
                        const ratio = segs[i].len === 0 ? 0 : targetLen / segs[i].len;
                        midX = segs[i].start.x + segs[i].dx * ratio;
                        midY = segs[i].start.y + segs[i].dy * ratio;
                        break;
                    }
                    targetLen -= segs[i].len;
                }

                const labelContainer = document.createElement('div');
                labelContainer.className = 'edge-label';
                labelContainer.style.left = `${midX + edge.labelOffset.x}px`;
                labelContainer.style.top = `${midY + edge.labelOffset.y}px`;
                labelContainer.style.color = edge.color; labelContainer.style.borderColor = edge.color;
                if (activeNodeIds && !isActiveEdge) {
                    labelContainer.style.opacity = '0.12';
                }
                
                const span = document.createElement('span'); span.innerText = edge.label;
                const editBtn = document.createElement('button');
                editBtn.className = 'ml-1 p-0.5 rounded text-slate-400 hover:bg-slate-100 cursor-pointer';
                editBtn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"></path></svg>';
                editBtn.addEventListener('mousedown', e => e.stopPropagation());
                editBtn.addEventListener('click', e => { e.stopPropagation(); if(!state.isHandMode && !state.isConnecting && !state.isEditingEdges) openEdgeModal(edge.id); });

                labelContainer.addEventListener('mousedown', e => {
                    if (e.button !== 0) return;
                    if (state.isHandMode) {
                        e.stopPropagation();
                        startPanning(e.clientX, e.clientY);
                        return;
                    }
                    if (state.isConnecting || state.isEditingEdges) return;
                    e.stopPropagation();
                    state.draggedLabelId = edge.id;
                    const lp = getLocalPos(e.clientX, e.clientY);
                    state.labelDragStartX = lp.x; state.labelDragStartY = lp.y;
                    state.labelInitialOffset = { ...edge.labelOffset };
                });
                labelContainer.addEventListener('contextmenu', e => {
                    e.preventDefault();
                    e.stopPropagation();
                    openEdgeContextMenu(e.clientX, e.clientY, edge.id);
                });

                labelContainer.appendChild(span); labelContainer.appendChild(editBtn);
                elementsLayer.appendChild(labelContainer);

                // 中継点
                if (state.isEditingEdges) {
                    edge.waypoints.forEach((wp, index) => {
                        const h = document.createElement('div');
                        h.className = 'waypoint-handle'; h.style.left = `${wp.x}px`; h.style.top = `${wp.y}px`;
                        h.addEventListener('mousedown', e => {
                            e.stopPropagation();
                            const lp = getLocalPos(e.clientX, e.clientY);
                            state.draggedWaypoint = {
                                edge,
                                index,
                                offsetX: lp.x - wp.x,
                                offsetY: lp.y - wp.y
                            };
                        });
                        h.addEventListener('dblclick', e => { e.stopPropagation(); edge.waypoints.splice(index, 1); commitChange(); renderEdges(); });
                        elementsLayer.appendChild(h);
                    });
                    for (let i = 0; i < pts.length - 1; i++) {
                        const cx = (pts[i].x + pts[i+1].x)/2, cy = (pts[i].y + pts[i+1].y)/2;
                        const addH = document.createElement('div');
                        addH.className = 'waypoint-add-handle'; addH.style.left = `${cx}px`; addH.style.top = `${cy}px`;
                        addH.addEventListener('mousedown', e => {
                            e.stopPropagation();
                            edge.waypoints.splice(i, 0, {x: cx, y: cy});
                            const lp = getLocalPos(e.clientX, e.clientY);
                            state.draggedWaypoint = {
                                edge,
                                index: i,
                                offsetX: lp.x - cx,
                                offsetY: lp.y - cy
                            };
                            renderEdges();
                        });
                        elementsLayer.appendChild(addH);
                    }
                }
            });

            // 接続中の線
            if (state.isConnecting && state.sourceNodeId && currentMousePos) {
                const sn = state.nodes.find(n => n.id === state.sourceNodeId);
                if (sn) {
                    const tempLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                    tempLine.setAttribute('x1', sn.x); tempLine.setAttribute('y1', sn.y);
                    tempLine.setAttribute('x2', currentMousePos.x); tempLine.setAttribute('y2', currentMousePos.y);
                    tempLine.setAttribute('stroke', '#f87171'); tempLine.setAttribute('stroke-width', '3');
                    tempLine.setAttribute('stroke-dasharray', '5,5');
                    svgLayer.appendChild(tempLine);
                }
            }
        }

        function pasteClipboardAt(x, y) {
            if (!clipboardItem) return false;
            if (clipboardItem.type === 'node') {
                createNodeFromData(clipboardItem.data, x, y);
                commitChange();
                return true;
            }
            if (clipboardItem.type === 'group') {
                createGroupFromData(clipboardItem.data, x - (clipboardItem.data.width || 300) / 2, y - (clipboardItem.data.height || 200) / 2);
                commitChange();
                return true;
            }
            if (clipboardItem.type === 'memo') {
                createMemoFromData(clipboardItem.data, x - (clipboardItem.data.width || 220) / 2, y - (clipboardItem.data.height || 140) / 2);
                commitChange();
                return true;
            }
            return false;
        }

        function deleteNodeById(id) {
            state.edges = state.edges.filter(e => e.sourceId !== id && e.targetId !== id);
            state.nodes = state.nodes.filter(n => n.id !== id);
            removeItemReferencesFromItemGroups('node', id);
            commitChange();
            renderAll();
        }

        function deleteGroupById(id) {
            state.groups = state.groups.filter(g => g.id !== id);
            removeItemReferencesFromItemGroups('group', id);
            commitChange();
            renderAll();
        }

        function deleteMemoById(id) {
            state.memos = state.memos.filter(m => m.id !== id);
            removeItemReferencesFromItemGroups('memo', id);
            commitChange();
            renderAll();
        }

        function deleteEdgeById(id) {
            state.edges = state.edges.filter(e => e.id !== id);
            commitChange();
            renderEdges();
        }

        function openEdgeContextMenu(clientX, clientY, edgeId) {
            const edge = state.edges.find(e => e.id === edgeId);
            if (!edge) return;
            openContextMenu(clientX, clientY, [
                { label: '関係を編集', onSelect: () => openEdgeModal(edge.id) },
                { label: edge.hasArrow ? '矢印を外す' : '矢印を付ける', onSelect: () => { edge.hasArrow = !edge.hasArrow; commitChange(); renderEdges(); } },
                { label: 'ラベル位置をリセット', onSelect: () => { edge.labelOffset = { x: 0, y: 0 }; commitChange(); renderEdges(); } },
                { type: 'separator' },
                { label: '関係線を削除', danger: true, onSelect: () => deleteEdgeById(edge.id) }
            ], { type: 'edge', id: edge.id });
        }

        function openWorkspaceContextMenu(clientX, clientY) {
            const localPos = getLocalPos(clientX, clientY);
            openContextMenu(clientX, clientY, [
                { label: getPasteLabel(), disabled: !clipboardItem, onSelect: () => pasteClipboardAt(localPos.x, localPos.y) },
                { type: 'separator' },
                { label: 'キャラ追加', onSelect: () => { addNode(localPos.x, localPos.y, '新規キャラ'); commitChange(); } },
                { label: '枠を追加', onSelect: () => { addGroup(localPos.x - 150, localPos.y - 100); commitChange(); } },
                { label: 'メモ追加', onSelect: () => { addMemo(localPos.x - 110, localPos.y - 70); commitChange(); } },
                { type: 'separator' },
                { label: state.isHandMode ? 'ハンドモードを終了' : 'ハンドモードにする', onSelect: () => toggleHandMode() },
                { label: state.isSelectingItems ? '選択モードを終了' : '選択モードにする', onSelect: () => toggleSelectionMode() },
                { label: state.isConnecting ? '接続モードを終了' : '線をつなぐモード', onSelect: () => toggleConnectMode() },
                { label: state.isEditingEdges ? '線を曲げるモードを終了' : '線を曲げるモード', onSelect: () => toggleEdgeEditMode() }
            ], { type: 'workspace', x: localPos.x, y: localPos.y });
        }

        // --- モーダル管理 ---
        function initModals() {
            const overlay = document.getElementById('modalOverlay');
            overlay.addEventListener('mousedown', e => { if(e.target === overlay) closeModal(); });
            document.querySelectorAll('.btnCancel').forEach(btn => btn.addEventListener('click', closeModal));
            
            document.getElementById('btnSaveNode').addEventListener('click', saveNode);
            document.getElementById('btnDeleteNode').addEventListener('click', deleteNode);
            document.getElementById('btnChangeImage').addEventListener('click', () => imageUploader.click());

            document.getElementById('btnCancelCrop').addEventListener('click', closeCropModal);
            document.getElementById('btnApplyCrop').addEventListener('click', () => {
                if (!cropper) return;
                
                // 最大400x400にリサイズしながら切り抜き
                const canvas = cropper.getCroppedCanvas({
                    maxWidth: 400,
                    maxHeight: 400,
                    fillColor: '#ffffff' // 透過部分を白に塗りつぶしてJPEG化可能に
                });
                
                // JPEG形式で圧縮（画質0.8）
                tempImageBase64 = canvas.toDataURL('image/jpeg', 0.8);
                document.getElementById('modalNodeImg').src = tempImageBase64;
                
                closeCropModal();
            });
            
            document.getElementById('btnSaveEdge').addEventListener('click', saveEdge);
            document.getElementById('btnDeleteEdge').addEventListener('click', deleteEdge);

            document.getElementById('btnSaveGroup').addEventListener('click', saveGroup);
            document.getElementById('btnDeleteGroup').addEventListener('click', deleteGroup);

            document.getElementById('btnSaveMemo').addEventListener('click', saveMemo);
            document.getElementById('btnDeleteMemo').addEventListener('click', deleteMemo);
            document.getElementById('modalMemoCorners').addEventListener('input', (e) => {
                document.getElementById('modalMemoCornersLabel').innerText = e.target.value;
            });
            document.getElementById('modalMemoRoundness').addEventListener('input', (e) => {
                document.getElementById('modalMemoRoundnessLabel').innerText = e.target.value;
            });
            document.getElementById('modalMemoFontSize').addEventListener('input', (e) => {
                document.getElementById('modalMemoFontSizeLabel').innerText = e.target.value;
            });

            // 背景設定イベント
            document.querySelectorAll('.bg-pattern-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.bg-pattern-btn').forEach(b => {
                        b.classList.remove('border-indigo-500', 'bg-indigo-50', 'text-indigo-700');
                        b.classList.add('border-slate-200', 'text-slate-600');
                    });
                    e.target.classList.add('border-indigo-500', 'bg-indigo-50', 'text-indigo-700');
                    state.background.type = e.target.dataset.type;
                    applyBackground(); commitChange();
                });
            });

            document.querySelectorAll('.bg-color-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.bg-color-btn').forEach(b => b.classList.remove('ring-2', 'ring-offset-2', 'ring-indigo-500', 'scale-110'));
                    e.target.classList.add('ring-2', 'ring-offset-2', 'ring-indigo-500', 'scale-110');
                    state.background.color = e.target.dataset.color;
                    applyBackground(); commitChange();
                });
            });

            document.getElementById('customBgColor').addEventListener('input', (e) => {
                document.querySelectorAll('.bg-color-btn').forEach(b => b.classList.remove('ring-2', 'ring-offset-2', 'ring-indigo-500', 'scale-110'));
                state.background.color = e.target.value;
                applyBackground();
            });
            document.getElementById('customBgColor').addEventListener('change', commitChange);

            document.getElementById('modalEdgeWidth').addEventListener('input', e => {
                document.getElementById('valEdgeWidth').innerText = e.target.value;
            });

            // 画像出力設定モーダルのイベント
            const exportFormatRadios = document.querySelectorAll('input[name="exportFormat"]');
            exportFormatRadios.forEach(radio => {
                radio.addEventListener('change', (e) => {
                    exportFormat = e.target.value;
                    updateExportModalUI();
                });
            });

            const exportQualityInput = document.getElementById('exportJpegQuality');
            exportQualityInput.addEventListener('input', (e) => {
                exportJpegQuality = parseFloat(e.target.value);
                document.getElementById('exportJpegQualityLabel').innerText = exportJpegQuality.toFixed(2);
            });

            document.getElementById('btnExportConfirm').addEventListener('click', () => {
                closeModal();
                exportToImage({ format: exportFormat, quality: exportJpegQuality });
            });
        }

        function openExportModal() {
            const radios = document.querySelectorAll('input[name="exportFormat"]');
            radios.forEach(r => r.checked = r.value === exportFormat);
            const qualityInput = document.getElementById('exportJpegQuality');
            qualityInput.value = exportJpegQuality;
            document.getElementById('exportJpegQualityLabel').innerText = exportJpegQuality.toFixed(2);
            updateExportModalUI();
            openModalUI('exportModal');
        }

        function updateExportModalUI() {
            const jpegOptions = document.getElementById('jpegOptions');
            if (exportFormat === 'jpeg') {
                jpegOptions.classList.remove('hidden');
            } else {
                jpegOptions.classList.add('hidden');
            }
        }

        function openModalUI(modalId) {
            const overlay = document.getElementById('modalOverlay');
            ['nodeModal', 'edgeModal', 'groupModal', 'memoModal', 'bgModal', 'exportModal'].forEach(id => {
                document.getElementById(id).classList.add('hidden');
            });
            const target = document.getElementById(modalId);
            overlay.classList.remove('hidden');
            target.classList.remove('hidden');
            setTimeout(() => { overlay.classList.remove('opacity-0'); target.classList.remove('scale-95'); }, 10);
        }

        function closeModal() {
            const overlay = document.getElementById('modalOverlay');
            ['nodeModal', 'edgeModal', 'groupModal', 'memoModal', 'bgModal', 'exportModal'].forEach(id => {
                document.getElementById(id).classList.add('scale-95');
            });
            overlay.classList.add('opacity-0');
            setTimeout(() => {
                overlay.classList.add('hidden');
                editingNodeId = editingEdgeId = editingGroupId = editingMemoId = null;
            }, 200);
        }

        let cropper = null;

        function closeCropModal() {
            const overlay = document.getElementById('cropOverlay');
            const modal = document.getElementById('cropModal');
            modal.classList.add('scale-95');
            overlay.classList.add('opacity-0');
            setTimeout(() => {
                overlay.classList.add('hidden');
                modal.classList.add('hidden');
                if (cropper) { cropper.destroy(); cropper = null; }
            }, 200);
        }

        function handleImageUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = event => {
                const cropTargetImg = document.getElementById('cropTargetImg');
                cropTargetImg.src = event.target.result;
                
                // クロップモーダルを表示
                const overlay = document.getElementById('cropOverlay');
                const modal = document.getElementById('cropModal');
                overlay.classList.remove('hidden');
                modal.classList.remove('hidden');
                // アニメーションのため少し待機
                setTimeout(() => { overlay.classList.remove('opacity-0'); modal.classList.remove('scale-95'); }, 10);

                if (cropper) {
                    cropper.destroy();
                }
                
                // 画像が再描画された後にCropperを初期化
                setTimeout(() => {
                    cropper = new Cropper(cropTargetImg, {
                        aspectRatio: 1, // アイコン用に1:1の正方形に固定
                        viewMode: 1,
                        dragMode: 'move', // 画像自体をドラッグして移動できるようにする
                        autoCropArea: 0.9,
                        restore: false,
                        guides: true,
                        center: true,
                        highlight: false,
                        cropBoxMovable: true,
                        cropBoxResizable: true,
                        toggleDragModeOnDblclick: false,
                    });
                }, 100);
                
                document.getElementById('imageUploader').value = ''; 
            };
            reader.readAsDataURL(file);
        }

        // Node
        function openNodeModal(id) {
            editingNodeId = id;
            const n = state.nodes.find(x => x.id === id);
            document.getElementById('modalNodeName').value = n.name;
            document.getElementById('modalNodeStatus').value = normalizeNodeStatus(n.status);
            document.getElementById('modalShowStatusBadge').checked = n.showStatusBadge !== false;
            document.getElementById('modalShowNameLabel').checked = n.showNameLabel !== false;
            document.getElementById('modalNodeLabelBg').value = n.labelBgColor || '#ffffff';
            document.getElementById('modalNodeLabelColor').value = n.labelTextColor || '#333333';
            document.getElementById('modalNodeMemo').value = n.memo || '';
            document.getElementById('modalNodeImg').src = tempImageBase64 = n.image;
            openModalUI('nodeModal');
        }
        function saveNode() {
            const n = state.nodes.find(x => x.id === editingNodeId);
            if(n) {
                const name = document.getElementById('modalNodeName').value.trim();
                if(name) n.name = name;
                n.status = normalizeNodeStatus(document.getElementById('modalNodeStatus').value);
                n.showStatusBadge = document.getElementById('modalShowStatusBadge').checked;
                n.showNameLabel = document.getElementById('modalShowNameLabel').checked;
                n.labelBgColor = document.getElementById('modalNodeLabelBg').value;
                n.labelTextColor = document.getElementById('modalNodeLabelColor').value;
                n.memo = document.getElementById('modalNodeMemo').value;
                n.image = tempImageBase64;
                commitChange(); renderNodes();
            }
            closeModal();
        }
        function deleteNode() {
            if(!confirm("削除しますか？\n関連する線も消えます。")) return;
            deleteNodeById(editingNodeId); closeModal();
        }

        // Edge
        function renderColorSelector(containerId, currentColor, callback) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            
            // プリセットカラー
            colorPresets.forEach(preset => {
                const btn = document.createElement('button');
                btn.className = `w-8 h-8 rounded-full ${preset.class} transition-transform hover:scale-110 ring-2 ring-offset-2 flex-shrink-0`;
                btn.classList.add(currentColor === preset.value ? 'ring-indigo-500' : 'ring-transparent');
                btn.onclick = () => { callback(preset.value); renderColorSelector(containerId, preset.value, callback); };
                container.appendChild(btn);
            });

            // カスタムカラーピッカー
            const isCustom = !colorPresets.some(p => p.value === currentColor);
            
            const colorInput = document.createElement('input');
            colorInput.type = 'color';
            colorInput.value = currentColor || '#000000';
            colorInput.className = `w-8 h-8 rounded cursor-pointer border-0 p-0 flex-shrink-0 ring-2 ring-offset-2 transition-transform hover:scale-110 ${isCustom ? 'ring-indigo-500 scale-110' : 'ring-transparent'}`;
            colorInput.title = "カスタム色";
            
            colorInput.addEventListener('input', (e) => {
                callback(e.target.value);
                // 入力中は再フォーカスを防ぐため全体再描画はせず、見た目だけ更新
                container.querySelectorAll('button').forEach(b => {
                    b.classList.remove('ring-indigo-500');
                    b.classList.add('ring-transparent');
                });
                colorInput.classList.remove('ring-transparent');
                colorInput.classList.add('ring-indigo-500', 'scale-110');
            });
            
            colorInput.addEventListener('change', (e) => {
                 callback(e.target.value);
                 renderColorSelector(containerId, e.target.value, callback);
            });

            container.appendChild(colorInput);
        }
        function openEdgeModal(id) {
            editingEdgeId = id;
            const e = state.edges.find(x => x.id === id);
            document.getElementById('modalEdgeLabel').value = e.label;
            document.getElementById('modalEdgeArrow').checked = e.hasArrow;
            document.getElementById('modalEdgeStyle').value = e.style || 'solid';
            document.getElementById('modalEdgeWidth').value = e.width || 3;
            document.getElementById('valEdgeWidth').innerText = e.width || 3;
            editingEdgeColor = e.color;
            renderColorSelector('colorSelector', editingEdgeColor, c => editingEdgeColor = c);
            openModalUI('edgeModal');
        }
        function saveEdge() {
            const e = state.edges.find(x => x.id === editingEdgeId);
            if(e) {
                const l = document.getElementById('modalEdgeLabel').value.trim();
                if(l !== "") e.label = l;
                e.color = editingEdgeColor;
                e.hasArrow = document.getElementById('modalEdgeArrow').checked;
                e.style = document.getElementById('modalEdgeStyle').value;
                e.width = parseInt(document.getElementById('modalEdgeWidth').value, 10);
                commitChange(); renderEdges();
            }
            closeModal();
        }
        function deleteEdge() {
            deleteEdgeById(editingEdgeId); closeModal();
        }

        // Group
        function openGroupModal(id) {
            editingGroupId = id;
            const g = state.groups.find(x => x.id === id);
            document.getElementById('modalGroupLabel').value = g.label;
            editingGroupColor = g.color;
            renderColorSelector('groupColorSelector', editingGroupColor, c => editingGroupColor = c);
            openModalUI('groupModal');
        }
        function saveGroup() {
            const g = state.groups.find(x => x.id === editingGroupId);
            if(g) {
                const l = document.getElementById('modalGroupLabel').value.trim();
                if(l !== "") g.label = l;
                g.color = editingGroupColor;
                commitChange(); renderGroups();
            }
            closeModal();
        }
        function deleteGroup() {
            deleteGroupById(editingGroupId); closeModal();
        }

        // Memo
        function openMemoModal(id) {
            editingMemoId = id;
            const m = state.memos.find(x => x.id === id);
            document.getElementById('modalMemoText').value = m.text;
            document.getElementById('modalMemoAlignX').value = m.alignX || 'center';
            document.getElementById('modalMemoAlignY').value = m.alignY || 'center';
            document.getElementById('modalMemoFontSize').value = m.fontSize || 13;
            document.getElementById('modalMemoFontSizeLabel').innerText = m.fontSize || 13;
            document.getElementById('modalMemoCorners').value = m.corners;
            document.getElementById('modalMemoCornersLabel').innerText = m.corners;
            document.getElementById('modalMemoRoundness').value = m.roundness;
            document.getElementById('modalMemoRoundnessLabel').innerText = m.roundness;
            editingMemoColor = m.color;
            renderColorSelector('memoColorSelector', editingMemoColor, c => editingMemoColor = c);
            openModalUI('memoModal');
        }
        function saveMemo() {
            const m = state.memos.find(x => x.id === editingMemoId);
            if (m) {
                m.text = document.getElementById('modalMemoText').value;
                m.alignX = document.getElementById('modalMemoAlignX').value;
                m.alignY = document.getElementById('modalMemoAlignY').value;
                m.fontSize = parseInt(document.getElementById('modalMemoFontSize').value, 10) || 13;
                m.color = editingMemoColor;
                m.corners = parseInt(document.getElementById('modalMemoCorners').value, 10) || 4;
                m.roundness = parseInt(document.getElementById('modalMemoRoundness').value, 10) || 0;
                commitChange(); renderMemos();
            }
            closeModal();
        }
        function deleteMemo() {
            deleteMemoById(editingMemoId); closeModal();
        }

        init();
    </script>
</body>
</html>
